<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CV.Build — Your Templates</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Libre+Baskerville:wght@400;700&family=Playfair+Display:wght@400;500;600;700;800&family=DM+Serif+Display&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --green:#88ffc6; --border:#ddd; --grey:rgba(0,0,0,0.45); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"Libre Baskerville",serif; background:#fff; color:#000; min-height:100vh; overflow-x:hidden; }

    .page-header { padding:25px 60px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:#fff; z-index:200; }
    .logo { font-family:"Cormorant Garamond",serif; font-size:22px; font-weight:700; text-transform:uppercase; letter-spacing:5px; color:#000; text-decoration:none; }
    .logo span { color:#000; }
    .free-badge { font-family:"Libre Baskerville",serif; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:3px; background:#000; color:#fff; padding:7px 16px; border:none; }

    .hero { padding:50px 60px 30px; border-bottom:1px solid var(--border); }
    .hero-label { font-family:"Libre Baskerville",serif; font-size:10px; font-weight:400; text-transform:uppercase; letter-spacing:5px; color:var(--grey); margin-bottom:10px; }
    .hero-heading { font-family:"Cormorant Garamond",serif; font-size:64px; font-weight:700; text-transform:uppercase; line-height:1; letter-spacing:2px; }
    .hero-heading span { color:#fff; -webkit-text-stroke:2px #000; }
    .hero-sub { font-family:"Libre Baskerville",serif; font-size:11px; color:var(--grey); text-transform:uppercase; letter-spacing:2px; margin-top:12px; }

    .carousel-wrap { position:relative; padding:50px 0 30px; }
    .carousel-track-outer { overflow:hidden; width:100%; }
    .carousel-track { display:flex; transition:transform 0.5s cubic-bezier(0.77,0,0.175,1); }
    .carousel-slide { min-width:100%; padding:0 60px; display:flex; flex-direction:column; align-items:center; }
    .slide-label { width:100%; max-width:860px; display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .slide-label .template-name { font-family:"Libre Baskerville",serif; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:4px; }
    .slide-label .template-num { font-family:"Libre Baskerville",serif; font-size:10px; font-weight:400; letter-spacing:2px; color:var(--grey); }
    .cv-preview-wrapper { width:100%; max-width:860px; position:relative; box-shadow:0 20px 80px rgba(0,0,0,0.12); }

    .select-bar { width:100%; max-width:860px; margin-top:20px; display:flex; align-items:center; justify-content:space-between; }
    .select-label { font-family:"Libre Baskerville",serif; font-size:10px; font-weight:400; text-transform:uppercase; letter-spacing:2px; color:var(--grey); }
    .select-checkbox { display:flex; align-items:center; gap:12px; cursor:pointer; }
    .custom-check { width:24px; height:24px; border:2px solid #000; display:flex; align-items:center; justify-content:center; transition:background 0.2s; flex-shrink:0; }
    .custom-check::after { content:'✓'; font-size:13px; font-weight:700; color:#fff; opacity:0; transition:opacity 0.2s; }
    .select-checkbox.checked .custom-check { background:#000; }
    .select-checkbox.checked .custom-check::after { opacity:1; }
    .select-checkbox .check-label { font-family:"Libre Baskerville",serif; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px; }

    .carousel-controls { display:flex; align-items:center; justify-content:center; gap:30px; padding:30px 60px; border-top:1px solid var(--border); }
    .carousel-btn { background:none; border:1px solid #000; width:50px; height:50px; font-size:20px; cursor:pointer; font-family:"Libre Baskerville",serif; transition:all 0.3s; display:flex; align-items:center; justify-content:center; }
    .carousel-btn:hover { background:#000; color:#fff; }
    .carousel-btn:disabled { opacity:0.2; cursor:not-allowed; }
    .carousel-btn:disabled:hover { background:none; color:#000; }
    .carousel-dots { display:flex; gap:10px; align-items:center; }
    .dot { width:8px; height:8px; background:var(--border); cursor:pointer; transition:all 0.3s; }
    .dot.active { background:#000; width:24px; }

    .bottom-bar { position:fixed; bottom:0; left:0; width:100%; background:#000; padding:20px 60px; display:flex; align-items:center; justify-content:space-between; z-index:300; transition:transform 0.4s ease; transform:translateY(100%); }
    .bottom-bar.visible { transform:translateY(0); }
    .bottom-bar-left { display:flex; flex-direction:column; gap:4px; }
    .bottom-bar-label { font-family:"Libre Baskerville",serif; font-size:9px; font-weight:400; text-transform:uppercase; letter-spacing:3px; color:rgba(255,255,255,0.5); }
    .bottom-bar-title { font-family:"Cormorant Garamond",serif; font-size:28px; font-weight:700; color:#fff; text-transform:uppercase; letter-spacing:3px; }
    .bottom-bar-sub { font-family:"Libre Baskerville",serif; font-size:9px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:2px; }
    .dl-btn { background:#fff; color:#000; border:none; padding:18px 50px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:3px; cursor:pointer; font-family:"Libre Baskerville",serif; transition:all 0.3s; }
    .dl-btn:hover { background:#ddd; }

    .loading-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px; }
    .loading-screen.hidden { display:none; }
    .loading-title { font-family:"Cormorant Garamond",serif; font-size:18px; font-weight:700; text-transform:uppercase; letter-spacing:6px; }
    .loading-bar-wrap { width:300px; height:1px; background:var(--border); }
    .loading-bar-fill { height:100%; background:#000; width:0%; transition:width 0.3s ease; }
    .loading-status { font-family:"Libre Baskerville",serif; font-size:10px; color:var(--grey); text-transform:uppercase; letter-spacing:2px; }

    /* ══ TEMPLATE STYLES ══ */

    /* 1. MINIMAL */
    .cv-minimal { background:#fff; padding:50px; font-family:"Montserrat",sans-serif; min-height:900px; }
    .cv-minimal .cv-name { font-size:36px; font-weight:800; text-transform:uppercase; letter-spacing:4px; line-height:1; margin-bottom:6px; }
    .cv-minimal .cv-role { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:4px; color:var(--grey); margin-bottom:25px; }
    .cv-minimal .cv-contact { display:flex; gap:25px; flex-wrap:wrap; font-size:10px; color:var(--grey); text-transform:uppercase; letter-spacing:1px; padding-bottom:25px; border-bottom:1px solid #000; margin-bottom:30px; }
    .cv-minimal .cv-section-title { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:4px; margin-bottom:12px; }
    .cv-minimal .cv-summary { font-size:12px; line-height:1.8; color:#333; margin-bottom:30px; padding-bottom:30px; border-bottom:1px solid var(--border); }
    .cv-minimal .cv-exp-item { margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid var(--border); }
    .cv-minimal .cv-exp-item:last-child { border-bottom:none; }
    .cv-minimal .cv-exp-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
    .cv-minimal .cv-exp-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
    .cv-minimal .cv-exp-company { font-size:10px; color:var(--grey); margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
    .cv-minimal .cv-exp-date { font-size:10px; color:var(--grey); text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }
    .cv-minimal .cv-exp-desc { font-size:11px; line-height:1.7; color:#444; }
    .cv-minimal .cv-skills-wrap { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:30px; }
    .cv-minimal .cv-skill { border:1px solid #000; padding:3px 12px; font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:1px; }
    .cv-minimal .cv-two-col { display:grid; grid-template-columns:1fr 1fr; gap:35px; }
    .cv-minimal .cv-lang-item { display:flex; justify-content:space-between; font-size:10px; padding:5px 0; border-bottom:1px solid var(--border); text-transform:uppercase; }
    .cv-minimal .cv-lang-level { color:var(--grey); }
    .cv-minimal .cv-edu-degree { font-size:11px; font-weight:700; text-transform:uppercase; }
    .cv-minimal .cv-edu-school { font-size:10px; color:var(--grey); text-transform:uppercase; }
    .cv-minimal .cv-section-block { margin-bottom:30px; }

    /* 2. MODERN */
    .cv-modern { background:#fff; display:grid; grid-template-columns:260px 1fr; min-height:900px; font-family:"Montserrat",sans-serif; }
    .cv-modern .cv-sidebar { background:#000; color:#fff; padding:40px 25px; }
    .cv-modern .cv-name { font-size:22px; font-weight:800; text-transform:uppercase; letter-spacing:2px; line-height:1.1; margin-bottom:5px; color:#fff; }
    .cv-modern .cv-role { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:3px; color:var(--green); margin-bottom:30px; }
    .cv-modern .sidebar-section-title { font-size:8px; font-weight:800; text-transform:uppercase; letter-spacing:4px; color:rgba(255,255,255,0.4); margin-bottom:10px; margin-top:25px; }
    .cv-modern .cv-contact-item { font-size:9px; color:rgba(255,255,255,0.7); margin-bottom:5px; line-height:1.5; word-break:break-all; }
    .cv-modern .cv-skill { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
    .cv-modern .cv-skill-dot { width:5px; height:5px; background:var(--green); flex-shrink:0; }
    .cv-modern .cv-skill-name { font-size:9px; color:rgba(255,255,255,0.8); text-transform:uppercase; letter-spacing:1px; }
    .cv-modern .cv-lang-item { display:flex; justify-content:space-between; font-size:9px; color:rgba(255,255,255,0.7); margin-bottom:5px; text-transform:uppercase; }
    .cv-modern .cv-lang-level { color:var(--green); }
    .cv-modern .cv-main { padding:40px 35px; }
    .cv-modern .cv-section-title { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:4px; margin-bottom:15px; padding-bottom:7px; border-bottom:2px solid #000; }
    .cv-modern .cv-summary { font-size:11px; line-height:1.8; color:#444; margin-bottom:30px; }
    .cv-modern .cv-exp-item { margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid var(--border); }
    .cv-modern .cv-exp-item:last-child { border-bottom:none; }
    .cv-modern .cv-exp-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
    .cv-modern .cv-exp-meta { font-size:9px; color:var(--grey); text-transform:uppercase; letter-spacing:1px; margin-bottom:7px; }
    .cv-modern .cv-exp-desc { font-size:11px; line-height:1.7; color:#444; }
    .cv-modern .cv-section-block { margin-bottom:30px; }

    /* 3. CORPORATE */
    .cv-corporate { background:#fff; font-family:"Playfair Display",serif; min-height:900px; }
    .cv-corporate .cv-top { background:#000; color:#fff; padding:45px 55px; text-align:center; }
    .cv-corporate .cv-name { font-size:42px; font-weight:700; letter-spacing:6px; text-transform:uppercase; margin-bottom:7px; }
    .cv-corporate .cv-role { font-size:11px; letter-spacing:6px; text-transform:uppercase; color:var(--green); font-family:"Montserrat",sans-serif; }
    .cv-corporate .cv-contact { display:flex; justify-content:center; gap:25px; flex-wrap:wrap; margin-top:15px; font-family:"Montserrat",sans-serif; font-size:10px; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:2px; }
    .cv-corporate .cv-body { padding:45px 55px; }
    .cv-corporate .cv-section-title { font-size:18px; font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:15px; padding-bottom:8px; border-bottom:1px solid #000; display:flex; align-items:center; gap:12px; }
    .cv-corporate .cv-section-title::before { content:''; width:25px; height:2px; background:var(--green); display:inline-block; flex-shrink:0; }
    .cv-corporate .cv-summary { font-size:13px; line-height:1.9; color:#333; margin-bottom:35px; font-style:italic; }
    .cv-corporate .cv-exp-item { margin-bottom:22px; padding-bottom:22px; border-bottom:1px solid var(--border); }
    .cv-corporate .cv-exp-item:last-child { border-bottom:none; }
    .cv-corporate .cv-exp-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:3px; }
    .cv-corporate .cv-exp-title { font-size:15px; font-weight:700; letter-spacing:1px; }
    .cv-corporate .cv-exp-date { font-family:"Montserrat",sans-serif; font-size:9px; color:var(--grey); text-transform:uppercase; letter-spacing:2px; }
    .cv-corporate .cv-exp-company { font-family:"Montserrat",sans-serif; font-size:10px; color:var(--grey); text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
    .cv-corporate .cv-exp-desc { font-size:12px; line-height:1.8; color:#444; font-family:"Montserrat",sans-serif; }
    .cv-corporate .cv-two-col { display:grid; grid-template-columns:1fr 1fr; gap:35px; }
    .cv-corporate .cv-skill { font-family:"Montserrat",sans-serif; font-size:10px; padding:5px 0; border-bottom:1px solid var(--border); text-transform:uppercase; letter-spacing:2px; display:flex; align-items:center; gap:8px; }
    .cv-corporate .cv-skill::before { content:''; width:4px; height:4px; background:var(--green); border:1px solid #000; flex-shrink:0; }
    .cv-corporate .cv-lang-item { font-family:"Montserrat",sans-serif; display:flex; justify-content:space-between; font-size:10px; padding:5px 0; border-bottom:1px solid var(--border); text-transform:uppercase; }
    .cv-corporate .cv-lang-level { color:var(--grey); }
    .cv-corporate .cv-edu-degree { font-size:14px; font-weight:700; }
    .cv-corporate .cv-edu-school { font-family:"Montserrat",sans-serif; font-size:10px; color:var(--grey); text-transform:uppercase; }
    .cv-corporate .cv-section-block { margin-bottom:35px; }

    /* 4. EXECUTIVE */
    .cv-executive { background:#f9f7f4; font-family:"DM Serif Display",serif; min-height:900px; }
    .cv-executive .cv-top { padding:50px 55px 35px; border-bottom:3px solid #000; display:flex; align-items:flex-end; justify-content:space-between; }
    .cv-executive .cv-name { font-size:52px; font-weight:400; letter-spacing:2px; line-height:1; }
    .cv-executive .cv-top-right { text-align:right; }
    .cv-executive .cv-role { font-family:"Montserrat",sans-serif; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:4px; color:#666; margin-bottom:10px; }
    .cv-executive .cv-contact { font-family:"Montserrat",sans-serif; font-size:9px; color:#888; text-transform:uppercase; letter-spacing:1px; line-height:1.8; }
    .cv-executive .cv-body { padding:40px 55px; display:grid; grid-template-columns:1fr 280px; gap:50px; }
    .cv-executive .cv-section-title { font-size:22px; font-weight:400; margin-bottom:15px; }
    .cv-executive .cv-section-line { width:40px; height:2px; background:#000; margin-bottom:20px; }
    .cv-executive .cv-summary { font-family:"Montserrat",sans-serif; font-size:12px; line-height:1.9; color:#444; margin-bottom:35px; }
    .cv-executive .cv-exp-item { margin-bottom:25px; padding-bottom:25px; border-bottom:1px solid #ddd; }
    .cv-executive .cv-exp-item:last-child { border-bottom:none; }
    .cv-executive .cv-exp-title { font-size:18px; font-weight:400; margin-bottom:3px; }
    .cv-executive .cv-exp-meta { font-family:"Montserrat",sans-serif; font-size:9px; color:#888; text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
    .cv-executive .cv-exp-desc { font-family:"Montserrat",sans-serif; font-size:11px; line-height:1.8; color:#555; }
    .cv-executive .cv-sidebar-section { margin-bottom:30px; }
    .cv-executive .cv-sidebar-title { font-size:16px; font-weight:400; margin-bottom:5px; }
    .cv-executive .cv-sidebar-line { width:25px; height:1px; background:#000; margin-bottom:15px; }
    .cv-executive .cv-skill { font-family:"Montserrat",sans-serif; font-size:10px; color:#444; text-transform:uppercase; letter-spacing:1px; padding:5px 0; border-bottom:1px solid #e0e0e0; }
    .cv-executive .cv-lang-item { font-family:"Montserrat",sans-serif; display:flex; justify-content:space-between; font-size:10px; padding:5px 0; border-bottom:1px solid #e0e0e0; text-transform:uppercase; }
    .cv-executive .cv-lang-level { color:#888; }
    .cv-executive .cv-edu-degree { font-size:15px; font-weight:400; }
    .cv-executive .cv-edu-school { font-family:"Montserrat",sans-serif; font-size:9px; color:#888; text-transform:uppercase; margin-bottom:10px; }

    /* 5. CLASSIC */
    .cv-classic { background:#fff; font-family:"Montserrat",sans-serif; min-height:900px; padding:55px; }
    .cv-classic .cv-header { text-align:center; padding-bottom:20px; border-bottom:2px solid #000; margin-bottom:25px; }
    .cv-classic .cv-name { font-size:32px; font-weight:800; text-transform:uppercase; letter-spacing:6px; margin-bottom:5px; }
    .cv-classic .cv-role { font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:4px; color:#555; margin-bottom:10px; }
    .cv-classic .cv-contact { font-size:10px; color:#555; display:flex; justify-content:center; gap:20px; flex-wrap:wrap; text-transform:uppercase; }
    .cv-classic .cv-section { margin-bottom:25px; }
    .cv-classic .cv-section-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:4px; border-bottom:1px solid #000; padding-bottom:5px; margin-bottom:15px; }
    .cv-classic .cv-summary { font-size:12px; line-height:1.8; color:#333; }
    .cv-classic .cv-exp-item { margin-bottom:18px; }
    .cv-classic .cv-exp-header { display:flex; justify-content:space-between; }
    .cv-classic .cv-exp-title { font-size:12px; font-weight:700; text-transform:uppercase; }
    .cv-classic .cv-exp-date { font-size:10px; color:#666; text-transform:uppercase; }
    .cv-classic .cv-exp-company { font-size:10px; color:#666; text-transform:uppercase; margin-bottom:5px; font-style:italic; }
    .cv-classic .cv-exp-desc { font-size:11px; line-height:1.7; color:#444; }
    .cv-classic .cv-skills-wrap { display:flex; flex-wrap:wrap; gap:6px; }
    .cv-classic .cv-skill { font-size:10px; text-transform:uppercase; background:#f0f0f0; padding:4px 12px; }
    .cv-classic .cv-two-col { display:grid; grid-template-columns:1fr 1fr; gap:30px; }
    .cv-classic .cv-lang-item { display:flex; justify-content:space-between; font-size:10px; padding:4px 0; border-bottom:1px solid #eee; text-transform:uppercase; }
    .cv-classic .cv-lang-level { color:#666; }
    .cv-classic .cv-edu-degree { font-size:12px; font-weight:700; text-transform:uppercase; }
    .cv-classic .cv-edu-school { font-size:10px; color:#666; text-transform:uppercase; }

    /* 6. ACADEMIC */
    .cv-academic { background:#fff; font-family:"Montserrat",sans-serif; min-height:900px; }
    .cv-academic .cv-top { background:#1a1a2e; padding:45px 55px; }
    .cv-academic .cv-name { font-size:34px; font-weight:800; text-transform:uppercase; letter-spacing:3px; color:#fff; margin-bottom:5px; }
    .cv-academic .cv-role { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:4px; color:#a8d8ea; margin-bottom:15px; }
    .cv-academic .cv-contact { display:flex; gap:20px; flex-wrap:wrap; font-size:9px; color:rgba(255,255,255,0.6); text-transform:uppercase; }
    .cv-academic .cv-body { padding:40px 55px; }
    .cv-academic .cv-section-title { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:4px; color:#1a1a2e; margin-bottom:15px; padding-left:12px; border-left:3px solid #1a1a2e; }
    .cv-academic .cv-summary { font-size:12px; line-height:1.8; color:#333; margin-bottom:30px; }
    .cv-academic .cv-exp-item { margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid #eee; }
    .cv-academic .cv-exp-item:last-child { border-bottom:none; }
    .cv-academic .cv-exp-title { font-size:12px; font-weight:700; text-transform:uppercase; margin-bottom:2px; }
    .cv-academic .cv-exp-meta { font-size:9px; color:#666; text-transform:uppercase; letter-spacing:2px; margin-bottom:7px; }
    .cv-academic .cv-exp-desc { font-size:11px; line-height:1.7; color:#444; }
    .cv-academic .cv-skills-wrap { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:25px; }
    .cv-academic .cv-skill { background:#1a1a2e; color:#fff; padding:4px 12px; font-size:9px; font-weight:600; text-transform:uppercase; }
    .cv-academic .cv-two-col { display:grid; grid-template-columns:1fr 1fr; gap:30px; }
    .cv-academic .cv-lang-item { display:flex; justify-content:space-between; font-size:10px; padding:5px 0; border-bottom:1px solid #eee; text-transform:uppercase; }
    .cv-academic .cv-lang-level { color:#1a1a2e; font-weight:700; }
    .cv-academic .cv-edu-degree { font-size:12px; font-weight:700; text-transform:uppercase; }
    .cv-academic .cv-edu-school { font-size:10px; color:#666; text-transform:uppercase; }
    .cv-academic .cv-section-block { margin-bottom:30px; }

    /* 7. TECH */
    .cv-tech { background:#0d0d0d; font-family:"Space Grotesk",sans-serif; min-height:900px; color:#fff; }
    .cv-tech .cv-top { padding:45px 50px; border-bottom:1px solid #333; }
    .cv-tech .cv-name { font-size:38px; font-weight:700; letter-spacing:2px; color:#fff; margin-bottom:5px; }

<body>

  <div class="loading-screen" id="loadingScreen">
    <p class="loading-title">Generating Your CVs</p>
    <div class="loading-bar-wrap"><div class="loading-bar-fill" id="loadingBar"></div></div>
    <p class="loading-status" id="loadingStatus">Preparing your information...</p>
  </div>

  <header class="page-header">
    <a href="index.html" class="logo">CV<span>.</span>Build</a>
    <div class="free-badge">Free Download</div>
  </header>

  <div class="hero">
    <p class="hero-label">Step 02 — Choose Your Template</p>
    <h1 class="hero-heading">Your <span>3 CV</span> Templates</h1>
    <p class="hero-sub">Pick your favorite — download instantly for free</p>
  </div>

  <div class="carousel-wrap">
    <div class="carousel-track-outer">
      <div class="carousel-track" id="carouselTrack"></div>
    </div>
    <div class="carousel-controls">
      <button class="carousel-btn" id="prevBtn" onclick="slide(-1)" disabled>←</button>
      <div class="carousel-dots" id="dotsContainer"></div>
      <button class="carousel-btn" id="nextBtn" onclick="slide(1)">→</button>
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <div class="bottom-bar-left">
      <span class="bottom-bar-label">Selected</span>
      <span class="bottom-bar-title" id="selectedTemplateName">—</span>
      <span class="bottom-bar-sub">Click download to get your free CV</span>
    </div>
    <button class="dl-btn" onclick="proceedToDownload()">Download Free →</button>
  </div>

  <script>
    const cvData = JSON.parse(localStorage.getItem('cvData') || '{}');
    const s = v => v || '';
    const hasExp = e => e && e.length > 0 && e[0].title;
    const hasEdu = e => e && e.length > 0 && e[0].degree;
    const hasLang = l => l && l.length > 0 && l[0].name;
    const hasSk = sk => sk && sk.length > 0;

    const ALL_TEMPLATES = [
      { id:1, name:'Minimal', dark:false, render:renderMinimal },
      { id:2, name:'Modern', dark:false, render:renderModern },
      { id:3, name:'Corporate', dark:false, render:renderCorporate },
      { id:4, name:'Executive', dark:false, render:renderExecutive },
      { id:5, name:'Classic', dark:false, render:renderClassic },
      { id:6, name:'Academic', dark:false, render:renderAcademic },
      { id:7, name:'Tech', dark:true, render:renderTech },
      { id:8, name:'Creative', dark:false, render:renderCreative },
      { id:9, name:'Elegant', dark:false, render:renderElegant },
      { id:10, name:'Bold', dark:false, render:renderBold },
      { id:11, name:'Neon', dark:true, render:renderNeon },
      { id:12, name:'Newspaper', dark:false, render:renderNewspaper },
    ];

    const chosenTemplates = [...ALL_TEMPLATES].sort(() => Math.random() - 0.5).slice(0, 3);
    let selectedIndex = null;

    function buildCarousel() {
      const track = document.getElementById('carouselTrack');
      const dots = document.getElementById('dotsContainer');
      chosenTemplates.forEach((tpl, i) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.innerHTML = `
          <div class="slide-label">
            <span class="template-name">Template 0${i+1} — ${tpl.name}</span>
            <span class="template-num">${i+1} / 3</span>
          </div>
          <div class="cv-preview-wrapper">
            <div id="tpl-${i}"></div>
          </div>
          <div class="select-bar">
            <span class="select-label">Select this template</span>
            <div class="select-checkbox" id="check${i}" onclick="toggleSelect(${i})">
              <div class="custom-check"></div>
              <span class="check-label">Choose</span>
            </div>
          </div>`;
        track.appendChild(slide);
        const dot = document.createElement('div');
        dot.className = 'dot' + (i===0?' active':'');
        dot.onclick = () => goTo(i);
        dots.appendChild(dot);
        tpl.render(`tpl-${i}`);
      });
    }

    function simulateLoading() {
      const bar = document.getElementById('loadingBar');
      const status = document.getElementById('loadingStatus');
      const steps = [
        {pct:20, msg:'Reading your details...'},
        {pct:50, msg:'Selecting your unique templates...'},
        {pct:80, msg:'Designing your CVs...'},
        {pct:100, msg:'Done! Your CVs are ready.'},
      ];
      let i = 0;
      function next() {
        if (i >= steps.length) { setTimeout(()=>document.getElementById('loadingScreen').classList.add('hidden'),500); return; }
        bar.style.width = steps[i].pct+'%';
        status.textContent = steps[i].msg;
        i++; setTimeout(next, 700);
      }
      next();
    }

    function renderMinimal(id) {
      const d = cvData;
      let h = `<div class="cv-minimal"><div class="cv-name">${s(d.fullName)}</div><div class="cv-role">${s(d.jobTitle)}</div><div class="cv-contact">${[d.email,d.phone,d.location,d.website].filter(Boolean).map(v=>`<span>${v}</span>`).join('')}</div>`;
      if(d.summary)h+=`<div class="cv-section-block"><div class="cv-section-title">Profile</div><div class="cv-summary">${d.summary}</div></div>`;

      if(hasEdu(d.education)){col3+=`<div class="cv-section-title" style="margin-top:15px">Education</div>`;d.education.forEach(e=>{col3+=`<div class="cv-edu-degree">${s(e.degree)}</div><div class="cv-edu-school">${s(e.school)}</div>`})}
      document.getElementById(id).innerHTML=`<div class="cv-newspaper"><div class="cv-masthead"><div class="cv-name">${s(d.fullName)}</div><div class="cv-tagline">${s(d.jobTitle)}</div></div><div class="cv-dateline"><span>${[d.email,d.phone].filter(Boolean).join(' · ')}</span><span>${s(d.location)}</span></div><div class="cv-columns"><div class="cv-col">${col1}</div><div class="cv-col">${col2}</div><div class="cv-col">${col3}</div></div></div>`;
    }

    let current = 0;
    function slide(dir){current=Math.max(0,Math.min(2,current+dir));updateCarousel();}
    function goTo(i){current=i;updateCarousel();}
    function updateCarousel(){
      document.getElementById('carouselTrack').style.transform=`translateX(-${current*100}%)`;
      document.getElementById('prevBtn').disabled=current===0;
      document.getElementById('nextBtn').disabled=current===2;
      document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===current));
    }

    function toggleSelect(index) {
      if (selectedIndex === index) {
        selectedIndex = null;
        document.getElementById('check'+index).classList.remove('checked');
        document.getElementById('bottomBar').classList.remove('visible');
      } else {
        if (selectedIndex !== null) {
          document.getElementById('check'+selectedIndex).classList.remove('checked');
        }
        selectedIndex = index;
        document.getElementById('check'+index).classList.add('checked');
        document.getElementById('selectedTemplateName').textContent = chosenTemplates[index].name;
        document.getElementById('bottomBar').classList.add('visible');
      }
    }

    function proceedToDownload() {
      if (selectedIndex === null) return;
      localStorage.setItem('selectedTemplateName', chosenTemplates[selectedIndex].name);
      window.location.href = 'download.html';
    }

    simulateLoading();
    setTimeout(()=>{ buildCarousel(); }, 300);
  </script>
</body>
</html>
